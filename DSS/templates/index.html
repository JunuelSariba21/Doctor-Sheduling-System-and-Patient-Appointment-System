<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Doctor Scheduling System</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    body {
      background: #f8f9fa;
    }

    .card {
      border-radius: 15px;
    }

    .schedule-box {
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
      background: white;
    }
  </style>
</head>
<body>
<div class="container py-5">
  <h1 class="text-center mb-4">🏥 Doctor Scheduling System</h1>

  <!-- Add Doctor -->
  <div class="card shadow p-4 mb-4">
    <h4>Add Doctor</h4>
    <input id="doctor_name" class="form-control mb-2" placeholder="Doctor Name">
    <button class="btn btn-primary" onclick="addDoctor()">
      <i class="bi bi-plus-circle"></i> Add Doctor
    </button>
  </div>

  <!-- Add Availability -->
  <div class="card shadow p-4 mb-4">
    <h4>Add Availability</h4>
    <select id="doctor_select" class="form-select mb-2"></select>
    <input type="date" id="date" class="form-control mb-2">
    <input type="time" id="time_slot" class="form-control mb-2">
    <button class="btn btn-success" onclick="addAvailability()">
      <i class="bi bi-calendar-plus"></i> Add Availability
    </button>
  </div>

  <!-- Doctors Table -->
  <div class="card shadow p-4">
    <h4>Doctors & Available Time</h4>
    <table class="table table-bordered mt-3 align-middle">
      <thead class="table-dark">
        <tr>
          <th>ID</th>
          <th>Doctor</th>
          <th>Schedules</th>
          <th width="100">Actions</th>
        </tr>
      </thead>
      <tbody id="doctor_table"></tbody>
    </table>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-warning">
        <h5 class="modal-title">Edit Schedule</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="edit_doctor_id">
        <input type="hidden" id="old_date">
        <input type="hidden" id="old_time">

        <label>Doctor Name</label>
        <input id="edit_name" class="form-control mb-2">

        <label>Date</label>
        <input type="date" id="edit_date" class="form-control mb-2">

        <label>Time</label>
        <input type="time" id="edit_time" class="form-control mb-2">
      </div>
      <div class="modal-footer">
        <button class="btn btn-success" onclick="saveEdit()">
          <i class="bi bi-save"></i> Save Changes
        </button>
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
let modal = new bootstrap.Modal(document.getElementById('editModal'));

function loadDoctors() {
  fetch('/doctors')
    .then(r => r.json())
    .then(data => {
      let select = document.getElementById('doctor_select');
      select.innerHTML = '';

      data.forEach(doc => {
        select.innerHTML += `<option value="${doc.id}">${doc.name}</option>`;
      });
    });

  loadDoctorTable();
}

function loadDoctorTable() {
  fetch('/doctors/full')
    .then(r => r.json())
    .then(data => {
      let table = document.getElementById('doctor_table');
      table.innerHTML = '';

      data.forEach(doc => {
        let schedules = doc.availability.length
          ? doc.availability.map(a => `
            <div class="schedule-box d-flex justify-content-between align-items-center">
              <span>${a.date} ${a.time_slot}</span>
              <div>
                <button class="btn btn-warning btn-sm"
                  onclick="openEdit(${doc.id}, '${doc.name}', '${a.date}', '${a.time_slot}')">
                  <i class="bi bi-pencil-square"></i>
                </button>

                <button class="btn btn-danger btn-sm"
                  onclick="deleteSlot(${doc.id}, '${a.date}', '${a.time_slot}')">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
            </div>
          `).join('')
          : `<span class="text-muted">No schedule</span>`;

        table.innerHTML += `
          <tr>
            <td>${doc.id}</td>
            <td>${doc.name}</td>
            <td>${schedules}</td>
            <td>
              <button class="btn btn-danger btn-sm"
                onclick="deleteDoctor(${doc.id})">
                <i class="bi bi-trash-fill"></i>
              </button>
            </td>
          </tr>
        `;
      });
    });
}

function addDoctor() {
  fetch('/doctor', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({name: doctor_name.value})
  })
  .then(r => r.json())
  .then(data => {
    alert(data.message || data.error);
    doctor_name.value = '';
    loadDoctors();
  });
}

function addAvailability() {
  fetch('/availability', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      doctor_id: doctor_select.value,
      date: date.value,
      time_slot: time_slot.value
    })
  })
  .then(r => r.json())
  .then(data => {
    alert(data.message || data.error);
    loadDoctors();
  });
}

function openEdit(id, name, dateValue, timeValue) {
  edit_doctor_id.value = id;
  edit_name.value = name;
  edit_date.value = dateValue;
  edit_time.value = timeValue;
  old_date.value = dateValue;
  old_time.value = timeValue;
  modal.show();
}

function saveEdit() {
  fetch('/edit-schedule', {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      doctor_id: edit_doctor_id.value,
      name: edit_name.value,
      old_date: old_date.value,
      old_time: old_time.value,
      new_date: edit_date.value,
      new_time: edit_time.value
    })
  })
  .then(r => r.json())
  .then(data => {
    alert(data.message || data.error);
    modal.hide();
    loadDoctors();
  });
}

function deleteDoctor(id) {
  if (!confirm('Delete this doctor and all schedules?')) return;

  fetch(`/doctor/${id}`, {method: 'DELETE'})
    .then(r => r.json())
    .then(data => {
      alert(data.message || data.error);
      loadDoctors();
    });
}

function deleteSlot(doctorId, dateValue, timeValue) {
  fetch('/delete-slot', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      doctor_id: doctorId,
      date: dateValue,
      time_slot: timeValue
    })
  })
  .then(r => r.json())
  .then(data => {
    alert(data.message || data.error);
    loadDoctors();
  });
}

loadDoctors();
</script>
</body>
</html>
